<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOME</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    body {
      font-family: 'Space Mono', 'Courier New', monospace;
      background: #f0ede8;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 3px solid #111;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    header .dot {
      width: 10px; height: 10px;
      background: #111;
      display: inline-block;
    }

    .logout-btn {
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 2px solid #111;
      padding: 8px 16px;
      background: transparent;
      color: #111;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .logout-btn:hover {
      background: #111;
      color: #f0ede8;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      border: 3px solid #111;
      background: #fff;
      width: 100%;
      max-width: 480px;
    }

    .card-title {
      padding: 20px 28px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #111;
      color: #f0ede8;
    }

    .card-body {
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 18px 0;
      border-bottom: 2px solid #e0ddd8;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
    }

    .row-value {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    .status-bar {
      border-top: 3px solid #111;
      padding: 14px 28px;
      background: #f0ede8;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #27ae60;
      display: inline-block;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="dot"></span>
      <span>Auth System</span>
    </div>
    <button class="logout-btn" id="logout">Log Out</button>
  </header>
  <main>
    <div class="card">
      <div class="card-title">Home</div>
      <div class="card-body">
        <div class="row">
          <span class="row-label">Username</span>
          <span class="row-value" id="username">—</span>
        </div>
        <div class="row">
          <span class="row-label">Email</span>
          <span class="row-value" id="email">—</span>
        </div>
      </div>
      <div class="status-bar">
        <span class="status-dot"></span>
        <span>Authenticated</span>
      </div>
    </div>
  </main>

  <script type="module">
    import { getCurrentUser, logout } from './auth.js';

    const user = getCurrentUser();
    if (!user) window.location.href = 'login.html';

    document.getElementById('username').textContent = user.username;
    document.getElementById('email').textContent = user.email;

    document.getElementById('logout').addEventListener('click', () => {
      logout();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
